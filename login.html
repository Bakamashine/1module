<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Открой Оренбуржье</title>
    <link rel="stylesheet" href="css/main.css">
</head>

<body>
    <header class="header header-light" id="header">
        <a href="index.html">
            <div class="header__logo">
                <img src="img/logo.jpg" alt="" class="" id="logo">
            </div>
        </a>
        <h1>Открой Оренбуржье</h1>
        <input type="checkbox" id="nav-toggle" hidden>
        <label for="nav-toggle" class="burger btn-light">Burger</label>
        <nav id="main-nav" class="header__nav">
            <a href="#search-section" class="btn btn-light" id="go-to-search">Поиск достопромечательностей</a>
            <a href="login.html" class="btn btn-light" id="nav-login">Войти</a>
            <a href="register.html" href="" class="btn btn-light" id="nav-register">Регистрация</a>
            <a href="profile.html" class="btn btn-light" id="nav-profile">Личный кабинет</a>
            <a href="catalog.html" class="btn btn-light" id="nav-catalog">Каталог достопромечательностей</a>
            <a class="btn btn-light mt-2 mobile close-menu">Закрыть</a>
        </nav>
    </header>

    <main class="main main-light">
        <form class="form form-full" id="login-form">
            <h1 class="header1">Авторизация</h1>
            <div class="mb-3">
                <label for="login-email" class="label label-light">Email</label>
                <input type="email" id="login-email" class="input input-light" required placeholder="Ваша почта...">
            </div>
            <div class="mb-3">
                <label for="login-password" class="label label-light">Пароль</label>
                <input type="password" id="login-password" class="input input-light" required placeholder="Ваш пароль...">
            </div>
            <div class="mb-3">
                <button class="btn btn-light" id="login-submit">Войти</button>    
            </div>

            <div class="mb-3">
                <button class="btn btn-light" id="forgot-password-link">Забыли пароль?</button>
            </div>
        </form>
    </main>
    <footer class="footer footer-light" id="footer">
        <div class="footer__info">
            <p>Телефон: 8-800-765-43-21</p>
            <p>Email: info@orenlandmarks.ru</p>
        </div>
        <nav class="footer__nav">
            <a class="btn btn-light" href="index.html">Главная</a>
            <a class="btn btn-light" href="login.html">Вход</a>
            <a class="btn btn-light" href="register.html">Регистрация</a>
            <a class="btn btn-light" href="profile.html">Личный кабинет</a>
            <a class="btn btn-light" href="catalog.html">Каталог</a>
            <a class="btn btn-light" href="landmark.html">Достопримечательности</a>
            <a class="btn btn-light" href="admin.html">Админ</a>
            <a class="btn btn-light" href="index_dark.html">Главная (тёмная)</a>
        </nav>
        <a class="btn btn-light mobile" href="#header">^</a>
    </footer>
</body>

</html>
